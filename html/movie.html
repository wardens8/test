    <style>
      /* 全局颜色变量 - 统一管理所有配色 */
      :root {
        /* 基础通用色 */
        --white: #ffffff;
        --shadow-light: rgba(0, 0, 0, 0.03);
        --shadow-base: rgba(0, 0, 0, 0.05);
        --shadow-hover: rgba(0, 0, 0, 0.1);
        --border-base: #eee;
        --text-dark: #2d3748;

        /* 分类主题色 - 每个分类统一主色/浅色/边框色 */
        /* 电影1（豆瓣）- 蓝色系 */
        --theme-1-primary: #4299e1;
        --theme-1-light: #e8f4f8;
        --theme-1-lighter: #f0f8fb;
        --theme-1-border: #bee3f8;
        --theme-1-text: #2b6cb0;
        --theme-1-border-deep: #90cdf4;

        /* 电影2（奥斯卡）- 紫色系 */
        --theme-2-primary: #805ad5;
        --theme-2-light: #faf0f5;
        --theme-2-lighter: #fdf2f8;
        --theme-2-border: #e9d8fd;
        --theme-2-text: #7472fe;
        --theme-2-border-deep: #e9d8fd;

        /* 推荐电影 - 绿色系 */
        --theme-3-primary: #38b2ac;
        --theme-3-light: #eaf6fa;
        --theme-3-lighter: #f5fafe;
        --theme-3-border: #9ae6b4;
        --theme-3-text: #2f855a;
        --theme-3-border-deep: #9ae6b4;

        /* 电视剧 - 橙色系 */
        --theme-4-primary: #ed8936;
        --theme-4-light: #fef7fb;
        --theme-4-lighter: #fcf1f7;
        --theme-4-border: #fcc367;
        --theme-4-text: #dd6b20;
        --theme-4-border-deep: #fcc367;

        /* 书籍 - 红色系 */
        --theme-5-primary: #e53e3e;
        --theme-5-light: #fdf2f8;
        --theme-5-lighter: #fef7fb;
        --theme-5-border: #fc8181;
        --theme-5-text: #c53030;
        --theme-5-border-deep: #fc8181;

        /* 纪录片（预留）- 青色系 */
        --theme-6-primary: #4299e1;
        --theme-6-light: #f0f8fb;
        --theme-6-lighter: #e8f4f8;
        --theme-6-border: #63b3ed;
        --theme-6-text: #2c5282;
        --theme-6-border-deep: #63b3ed;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: '微软雅黑', sans-serif;
      }
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        padding: 20px;
        min-height: 100vh;
      }
      .container {
        max-width: 1600px;
        margin: 0 auto;
        background: var(--white);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
        color: var(--text-dark);
        margin-bottom: 40px;
        font-size: 28px;
        font-weight: 600;
        position: relative;
        padding-bottom: 15px;
      }
      h1::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 3px;
        background: linear-gradient(90deg, var(--theme-1-primary), var(--theme-3-primary));
        border-radius: 3px;
      }

      /* 核心布局 */
      .rank-container {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .rank-column {
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 12px var(--shadow-base);
        position: relative;
        overflow: hidden;
        border: 1px solid;
        background: linear-gradient(135deg, var(--theme-light) 0%, var(--theme-lighter) 100%);
      }
      .rank-title {
        font-size: 22px;
        margin: 0 0 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid var(--border-base);
        font-weight: 600;
        display: flex;
        align-items: center;
        color: var(--theme-text);
        border-bottom-color: var(--theme-border-deep);
      }
      .rank-title::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 20px;
        border-radius: 3px;
        margin-right: 10px;
        background: var(--theme-primary);
      }
      .rank-list {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-start;
      }
      .rank-item {
        display: inline-flex;
        align-items: center;
        padding: 12px 18px;
        border-radius: 8px;
        justify-content: center;
        text-align: center;
        white-space: nowrap;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 4px var(--shadow-light);
        background: var(--white);
        border: 1px solid var(--theme-border-deep);
        color: var(--theme-text);
      }
      .rank-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px var(--shadow-hover);
        background: var(--theme-primary);
        color: var(--white);
      }
      .rank-name {
        transition: all 0.3s ease;
      }

      /* 分类主题色应用（通过单独类名，替代:nth-child，更易维护） */
      .theme-1 {
        --theme-light: var(--theme-1-light);
        --theme-lighter: var(--theme-1-lighter);
        --theme-border: var(--theme-1-border);
        --theme-text: var(--theme-1-text);
        --theme-border-deep: var(--theme-1-border-deep);
        --theme-primary: var(--theme-1-primary);
      }
      .theme-2 {
        --theme-light: var(--theme-2-light);
        --theme-lighter: var(--theme-2-lighter);
        --theme-border: var(--theme-2-border);
        --theme-text: var(--theme-2-text);
        --theme-border-deep: var(--theme-2-border-deep);
        --theme-primary: var(--theme-2-primary);
      }
      .theme-3 {
        --theme-light: var(--theme-3-light);
        --theme-lighter: var(--theme-3-lighter);
        --theme-border: var(--theme-3-border);
        --theme-text: var(--theme-3-text);
        --theme-border-deep: var(--theme-3-border-deep);
        --theme-primary: var(--theme-3-primary);
      }
      .theme-4 {
        --theme-light: var(--theme-4-light);
        --theme-lighter: var(--theme-4-lighter);
        --theme-border: var(--theme-4-border);
        --theme-text: var(--theme-4-text);
        --theme-border-deep: var(--theme-4-border-deep);
        --theme-primary: var(--theme-4-primary);
      }
      .theme-5 {
        --theme-light: var(--theme-5-light);
        --theme-lighter: var(--theme-5-lighter);
        --theme-border: var(--theme-5-border);
        --theme-text: var(--theme-5-text);
        --theme-border-deep: var(--theme-5-border-deep);
        --theme-primary: var(--theme-5-primary);
      }

      /* 响应式适配 */
      @media (max-width: 768px) {
        .container {
          padding: 20px;
        }
        h1 {
          font-size: 24px;
        }
        .rank-column {
          padding: 20px;
        }
        .rank-title {
          font-size: 20px;
        }
        .rank-item {
          padding: 10px 15px;
          font-size: 13px;
        }
      }
    </style>

      // 渲染榜单函数
      function renderRank(listId, data) {
        const list = document.getElementById(listId)
        if (!list) return

        let html = ''
        data.forEach((name, index) => {
          html += `
          <li class="rank-item">
            <span class="rank-name">${index + 1}. ${name}</span>
          </li>
        `
        })
        list.innerHTML = html
      }

      // 初始化页面
      function init() {
        renderRank('douban-rank', rankData.douban)
        renderRank('aosika-rank', rankData.aosika)
        renderRank('movie-rank', rankData.movie)
        renderRank('tv-rank', rankData.tv)
        renderRank('book-rank', rankData.book)
      }

      document.addEventListener('DOMContentLoaded', init)
